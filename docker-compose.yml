services:
  frontend:
    build: ./frontend
    container_name: log-assistant-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

  api:
    build: .
    container_name: log-assistant-api
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Log Assistant API
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_DB: log_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 14
      UPLOAD_DIR: assets/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.log,.txt}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./tools:/app/tools
      - uploaded_logs:/app/assets/uploads

  worker:
    build: .
    container_name: log-assistant-worker
    command: sh -c "alembic upgrade head && python -m app.worker"
    environment:
      APP_NAME: Log Assistant API
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_DB: log_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 14
      UPLOAD_DIR: assets/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.log,.txt}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - uploaded_logs:/app/assets/uploads

  postgres:
    image: postgres:16-alpine
    container_name: log-assistant-postgres
    environment:
      POSTGRES_DB: log_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: log-assistant-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  uploaded_logs:
